version: 2
autostart: true
offline_default: true
require_corroboration: 2
kill_switch_file: "~/.watcher/disable"
network_windows:
  - days: ["Mon-Sun"]
    start: "02:00"
    end: "04:00"
budgets:
  bandwidth_mb_per_day: 200
  cpu_percent_cap: 60
  ram_mb_cap: 4096
allowlist_domains:
  - docs.python.org
  - pytorch.org
  - w3.org
domain_rules:
  - domain: docs.python.org
    scope: web
  - domain: pytorch.org
    scope: web
  - domain: w3.org
    scope: web
subject:
  hostname: "{{ hostname }}"
  generated_at: "{{ generated_at }}"
